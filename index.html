<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f8f8f8">
<title>小窝 · Echo & 绪</title>
<style>
  :root{
    --bg: #f8f8f8;
    --headerTop1:#ffffff;
    --headerTop2:#e6e6e6;
    --border:#babbc0;
    --text:#666;
    --text2:#8e8e93;

    --stroke-ai: rgba(0,0,0,0.06);
    --stroke-user: rgba(255, 170, 210, 0.22);
    --bubble-shadow: 0 1px 2px rgba(0,0,0,0.10);

    --font: "PingFang SC","PingFangTC","Hiragino Sans GB","Helvetica Neue",Helvetica,Arial,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

    --tail-user: url('https://i.postimg.cc/C1ZBMZMK/IMG-9745.png');
    --tail-ai: url('https://i.postimg.cc/x8FMK9mk/IMG-2936.png');

    --tail-size: 11px;
    --tail-soften: 0.20px;

    --drawerW: min(320px, 86vw);
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family:var(--font);
    background: var(--bg);
    color:#222;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  /* 全屏矩形（iPhone11） */
  .app{
    width:100vw;
    height:100dvh;
    background: var(--bg);
    overflow:hidden;
    position:relative;
  }

  /* Header：三列网格，标题永远居中 */
  .header{
    position:relative;
    padding-top: env(safe-area-inset-top);
    height: calc(52px + env(safe-area-inset-top));
    background-image: linear-gradient(to bottom, var(--headerTop1), var(--headerTop2));
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset;
    display:grid;
    grid-template-columns: 92px 1fr 92px;
    align-items:center;
    padding-left: 8px;
    padding-right: 8px;
    z-index: 10;
  }
  .header .center{
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  .title{
    font-size:17px;
    font-weight:500;
    color:#888;
    text-shadow:0 1px 0 rgba(255,255,255,1);
    line-height:1;
  }

  .btn{
    height:30px;
    border:none;
    background:transparent;
    padding:0;
    cursor:pointer;
    filter: drop-shadow(0 1px 0 rgba(255,255,255,0.6));
    position:relative;
    justify-self:start;
  }
  .btn.right{ justify-self:end; }
  .btn-back{ width: 92px; }
  .btn-edit{ width: 60px; }

  .btn-back::before{
    content:"";
    position:absolute; inset:0;
    background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 74 30' preserveAspectRatio='none'%3E%3Cdefs%3E%3ClinearGradient id='btnGrad' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%23ebebe9'/%3E%3Cstop offset='1' stop-color='%23cfcfcf'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M13 1 L69 1 Q72 1 72 4 L72 26 Q72 29 69 29 L13 29 L1 15 Z' fill='url(%23btnGrad)' stroke='%239c9c9c' stroke-width='1' vector-effect='non-scaling-stroke'/%3E%3C/svg%3E");
    background-size:100% 100%;
    background-repeat:no-repeat;
  }
  .btn-edit::before{
    content:"";
    position:absolute; inset:0;
    background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 30' preserveAspectRatio='none'%3E%3Cdefs%3E%3ClinearGradient id='btnGrad' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%23ebebe9'/%3E%3Cstop offset='1' stop-color='%23cfcfcf'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='1' y='1' width='48' height='28' rx='4' fill='url(%23btnGrad)' stroke='%239c9c9c' stroke-width='1' vector-effect='non-scaling-stroke'/%3E%3C/svg%3E");
    background-size:100% 100%;
    background-repeat:no-repeat;
  }
  .btn span{
    position:relative;
    font-size:12px;
    font-weight:700;
    color:#888;
    text-shadow:0 1px 0 rgba(255,255,255,.7);
  }
  .btn-back span{ left:2px; } /* Messages 往右一点点更居中 */

  .decor{
    height:44px;
    border-bottom:1px solid var(--border);
    background-image: linear-gradient(to bottom, #f9f9f9, #ebebeb);
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    padding: 6px 10px;
    align-items:center;
    z-index: 9;
    position:relative;
  }
  .decor .pill{
    height:32px;
    border-radius:5px;
    background-image: linear-gradient(to bottom, #ffffff, #e6e6e6);
    border:1px solid #b2b2b2;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#888;
    font-weight:700;
    font-size:13px;
    text-shadow:0 1px 0 rgba(255,255,255,.7);
  }

  .messages{
    height: calc(100% - ( (52px + env(safe-area-inset-top)) + 44px + (58px + env(safe-area-inset-bottom)) ));
    padding: 12px 10px 16px;
    overflow:auto;
    scroll-behavior:smooth;
  }

  .row{
    display:flex;
    align-items:flex-end;
    gap:8px;
    margin-bottom: 22px;
    position: relative;
    user-select:none;
  }
  .row.ai{ justify-content:flex-start; }
  .row.user{ justify-content:flex-end; }

  .avatar{
    width:33px;height:33px;
    border-radius:20%;
    border:0px solid #a2a2a2;
    flex: 0 0 auto;
    background: linear-gradient(145deg,#dcdcdc,#f4f4f4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    background-size: cover;
    background-position: center;
    background-repeat:no-repeat;
  }
  /* 不显示你的头像 */
  .row.user .avatar{ display:none; }

  .bubble{
    position:relative;
    max-width: 82%;
    padding: 7px 13px;
    line-height:1.3;
    border-radius:18px;
    word-break: break-word;
    z-index:1;
    overflow: visible;
    box-shadow: var(--bubble-shadow);
    isolation:isolate;
    background-clip: padding-box;
  }
  .bubble .gloss{
    position:absolute;
    top:2px;
    width:85%;
    left:50%;
    transform:translateX(-50%);
    height:10px;
    border-radius:100px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0));
    filter: blur(1px);
    pointer-events:none;
    z-index:2;
  }
  .row.user .bubble .gloss{
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0));
  }

  .row.user .bubble{
    background-color: rgba(255,250,254,0.92);
    background-image: linear-gradient(to bottom, rgba(255,250,254,0.96), rgba(255,250,254,0.86));
    color:#333;
    border: 0.5px solid var(--stroke-user);
  }
  .row.ai .bubble{
    background-color: rgba(248,248,248,0.92);
    background-image: linear-gradient(to bottom, rgba(240,240,240,0.95), rgba(255,255,255,0.92));
    color:#4a4a4a;
    border: 0.5px solid var(--stroke-ai);
  }

  /* 气泡尾巴（保持你现有实现：插接+PNG+轻微blur） */
  .bubble::after{
    content:"";
    position:absolute;
    width: var(--tail-size);
    height: var(--tail-size);
    background-size:contain;
    background-repeat:no-repeat;
    z-index:3;
    pointer-events:none;
  }
  .row.ai .bubble::after{
    left:-4px;
    bottom:-4px;
    background-image: var(--tail-ai);
    filter: blur(var(--tail-soften)) grayscale(100%) brightness(1.10);
  }
  .row.user .bubble::after{
    right:-4px;
    bottom:-4px;
    background-image: var(--tail-user);
    filter: blur(var(--tail-soften)) grayscale(55%) brightness(1.05) saturate(1.1);
  }

  .timestamp{
    position:absolute;
    font-size:11px;
    color: var(--text2);
    bottom: -18px;
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
  }
  .row.ai .timestamp{ left: 42px; }
  .row.user .timestamp{ right: 8px; }
  .row.user .timestamp::before{
    content:"Delivered";
    font-weight:400;
    color: var(--text2);
  }

  .img{ display:block; max-width: 180px; border-radius: 8px; }

  .inputbar{
    position:absolute;
    left:0;right:0;bottom:0;
    height:58px;
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
    background-image: linear-gradient(to bottom, #ffffff, #f0f0f0);
    border-top: 1px solid #b2b2b2;
    display:flex;
    align-items:center;
    gap:10px;
    z-index: 20;
  }
  .btn-camera{
    width:35px;height:35px;border-radius:50%;
    border:1.5px solid #909090;
    background-image: linear-gradient(to bottom, rgba(255,255,255,.4) 50%, transparent 50%),
                      linear-gradient(to bottom, #d0d0d0, #a0a0a0);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    filter: drop-shadow(0 1px 0 rgba(255,255,255,1));
    flex:0 0 auto;
    position:relative;
  }
  .btn-camera svg{ width:21px;height:21px; stroke:#fff; fill:none; stroke-width:2.2; } /* 放大相机图标 */

  .textbox{
    flex:1 1 auto;
    height:34px;
    border-radius:18px;
    border:1px solid #c8c8c8;
    background:#fff;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.10);
    padding: 5px 10px;
    font-size:16px; /* iOS 防缩放 */
    outline:none;
    resize:none;
    overflow:auto;
    font-family:var(--font);
    line-height:1.15;
  }

  .btn-send{
    width:67px;height:37px;border:none;
    border-radius:18.5px;
    cursor:pointer;
    background: transparent;
    background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 67 37' preserveAspectRatio='none'%3E%3Cdefs%3E%3ClinearGradient id='sendGrad' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23888888'/%3E%3Cstop offset='100%25' stop-color='%23555555'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='1' y='1' width='65' height='35' rx='17.5' fill='url(%23sendGrad)' stroke='%23444444' stroke-width='1.5' vector-effect='non-scaling-stroke'/%3E%3C/svg%3E");
    background-size:100% 100%;
    background-repeat:no-repeat;
    filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.6));
    position:relative;
    flex:0 0 auto;
  }
  .btn-send::after{
    content:"Send";
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
    font-weight:700;
    color:rgba(255,255,255,0.95);
    text-shadow:0 -1px 0 rgba(0,0,0,0.3);
  }

  /* Drawer: iOS Messages list */
  .drawerMask{
    position:absolute; inset:0;
    background: rgba(0,0,0,0.25);
    opacity:0;
    pointer-events:none;
    transition: opacity .18s ease;
    z-index: 80;
  }
  .drawer{
    position:absolute;
    top:0; left:0;
    height:100%;
    width: var(--drawerW);
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(10px);
    border-right: 1px solid rgba(0,0,0,0.08);
    transform: translateX(-100%);
    transition: transform .2s ease;
    z-index: 90;
    display:flex;
    flex-direction:column;
  }
  .drawer.open{ transform: translateX(0); }
  .drawerMask.open{ opacity:1; pointer-events:auto; }

  .drawerTop{
    padding-top: env(safe-area-inset-top);
    height: calc(52px + env(safe-area-inset-top));
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-left: 14px;
    padding-right: 14px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    background: linear-gradient(to bottom, #fff, #f3f3f3);
  }
  .drawerTop .t{ font-size:17px; color:#333; font-weight:600; }
  .drawerTop .newBtn{
    border:none;
    background: #e9e9ea;
    color:#333;
    font-weight:700;
    border-radius: 10px;
    padding: 8px 10px;
    cursor:pointer;
  }

  .chatList{ overflow:auto; flex:1; }
  .chatItem{
    padding: 12px 14px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    display:flex;
    gap:10px;
    align-items:center;
    cursor:pointer;
  }
  .chatItem.active{ background: rgba(0,0,0,0.04); }
  .chatMeta{ flex:1; min-width:0; }
  .chatTitle{ font-size:15px; color:#111; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chatPrev{ font-size:12px; color:#8e8e93; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chatTime{ font-size:12px; color:#8e8e93; white-space:nowrap; }

  .drawerBottom{
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    border-top: 1px solid rgba(0,0,0,0.08);
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .miniBtn{
    border:1px solid rgba(0,0,0,0.12);
    background:#f6f6f6;
    border-radius: 10px;
    padding: 9px 10px;
    cursor:pointer;
    font-size:13px;
  }
  .danger{ border-color:#f0b2b2; background:#fff4f4; }

  /* Settings sheet */
  .modal-backdrop{
    position:absolute; inset:0;
    background: rgba(0,0,0,.35);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:999;
  }
  .modal-backdrop.show{ display:flex; }
  .sheet{
    width:100%;
    max-height: 86%;
    background: #fff;
    border-top-left-radius: 18px;
    border-top-right-radius: 18px;
    box-shadow: 0 -20px 60px rgba(0,0,0,.25);
    padding: 12px 12px 18px;
    overflow:auto;
  }
  .sheet h3{ margin: 8px 0 10px; font-size:14px; color:#444; }
  .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
  .field{ display:flex; flex-direction:column; gap:6px; margin-bottom:10px;}
  .field label{ font-size:12px; color:#777;}
  .field input,.field select,.field textarea{
    font-family:var(--font);
    font-size:13px;
    padding: 8px 10px;
    border:1px solid #e2e2e2;
    border-radius: 10px;
    outline:none;
    background:#fafafa;
  }
  .field textarea{ min-height:74px; resize:vertical; }
  .rowbtns{ display:flex; gap:10px; flex-wrap:wrap; }
  .ok{
    border:none;
    background:#2f2f2f;
    color:#fff;
    border-radius:12px;
    padding: 10px 12px;
    cursor:pointer;
    font-weight:700;
  }
  .hint{ font-size:12px; color:#888; line-height:1.3; }

  /* 状态提示（只在设置面板显示，不进聊天） */
  .statusLine{
    font-size:12px;
    color:#8e8e93;
    margin: 6px 0 0;
    min-height: 16px;
  }

  /* 长按菜单 */
  .ctxMask{
    position:absolute; inset:0;
    background: rgba(0,0,0,0.18);
    display:none;
    z-index: 1200;
  }
  .ctxMask.show{ display:block; }
  .ctxMenu{
    position:absolute;
    left: 12px;
    right: 12px;
    bottom: calc(10px + env(safe-area-inset-bottom));
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 16px;
    padding: 8px;
  }
  .ctxBtn{
    width:100%;
    border:none;
    background: transparent;
    padding: 12px 10px;
    text-align:left;
    font-size:16px;
    cursor:pointer;
    border-radius: 12px;
  }
  .ctxBtn:hover{ background: rgba(0,0,0,0.06); }
  .ctxBtn.d{ color:#d33; font-weight:700; }

  /* 多选模式 */
  .row.multi .bubble{ outline: 2px solid rgba(0,0,0,0.12); }
  .row.multi.selected .bubble{ outline: 2px solid rgba(0,0,0,0.35); }

</style>
</head>
<body>
<div class="app" id="app">
  <!-- Drawer -->
  <div class="drawerMask" id="drawerMask"></div>
  <aside class="drawer" id="drawer">
    <div class="drawerTop">
      <div class="t">Chats</div>
      <button class="newBtn" id="btnNewChat2">New</button>
    </div>
    <div class="chatList" id="chatList"></div>
    <div class="drawerBottom">
      <button class="miniBtn" id="btnExportJson2">导出JSON</button>
      <button class="miniBtn" id="btnImportJson2">导入JSON</button>
      <button class="miniBtn danger" id="btnDelChat2">删除会话</button>
      <input type="file" id="importFile2" accept="application/json" style="display:none" />
    </div>
  </aside>

  <div class="header">
    <button class="btn btn-back" id="btnBack" title="Messages"><span>Messages</span></button>
    <div class="center"><div class="title" id="titleName">Echo</div></div>
    <button class="btn btn-edit right" id="btnEdit" title="Edit"><span>Edit</span></button>
  </div>

  <div class="decor">
    <div class="pill">Call</div>
    <div class="pill">FaceTime</div>
    <div class="pill">Contact</div>
  </div>

  <div class="messages" id="msgBox" aria-live="polite"></div>

  <div class="inputbar">
    <button class="btn-camera" id="btnImg" title="Image">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 7h4l2-2h4l2 2h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z"/>
        <circle cx="12" cy="13" r="3.5"/>
      </svg>
    </button>
    <textarea class="textbox" id="input" placeholder="" rows="1"></textarea>
    <button class="btn-send" id="btnSend" title="Send"></button>
    <input type="file" id="file" accept="image/*" style="display:none" />
  </div>

  <!-- Settings -->
  <div class="modal-backdrop" id="modal">
    <div class="sheet">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <h3 style="margin:0;">Edit · 设置</h3>
        <button class="miniBtn" id="btnClose">关闭</button>
      </div>

      <h3>备注</h3>
      <div class="field">
        <label>给老公改备注（顶部居中显示）</label>
        <input id="cfgRemark" placeholder="例如 Echo / 老公 / 任何昵称" />
      </div>

      <h3>API（OpenAI兼容）</h3>
      <div class="grid">
        <div class="field">
          <label>Provider</label>
          <select id="cfgProvider">
            <option value="openai">OpenAI</option>
            <option value="deepseek">DeepSeek (OpenAI兼容)</option>
            <option value="groq">Groq (OpenAI兼容)</option>
            <option value="openrouter">OpenRouter (OpenAI兼容)</option>
            <option value="custom">Custom (OpenAI兼容)</option>
          </select>
        </div>
        <div class="field">
          <label>Model</label>
          <select id="cfgModelSel"></select>
          <input id="cfgModel" placeholder="若下拉为空可手填" style="margin-top:6px;">
        </div>
      </div>
      <div class="field">
        <label>Base URL</label>
        <input id="cfgBaseUrl" placeholder="例如 https://api.openai.com/v1" />
      </div>
      <div class="field">
        <label>API Key</label>
        <input id="cfgKey" placeholder="sk-..." type="password" />
      </div>
      <div class="rowbtns">
        <button class="miniBtn" id="btnFetchModels">拉取模型</button>
        <button class="miniBtn" id="btnReset">恢复默认URL</button>
      </div>
      <div class="statusLine" id="modelStatus"></div>

      <h3>System / Temperature</h3>
      <div class="grid">
        <div class="field">
          <label>Temperature</label>
          <input id="cfgTemp" type="number" min="0" max="2" step="0.1" />
        </div>
        <div class="field">
          <label>Max tokens (可空)</label>
          <input id="cfgMax" type="number" min="64" max="8192" step="1" placeholder="例如 2048" />
        </div>
      </div>
      <div class="field">
        <label>System Prompt</label>
        <textarea id="cfgSys"></textarea>
      </div>

      <h3>记忆</h3>
      <div class="grid">
        <div class="field">
          <label>上下文条数</label>
          <input id="cfgContextLimit" type="number" min="4" step="1" />
        </div>
        <div class="field">
          <label>自动总结频率（0=关）</label>
          <input id="cfgSummaryEvery" type="number" min="0" step="1" />
        </div>
      </div>
      <div class="field">
        <label>世界书</label>
        <textarea id="cfgWorldbook"></textarea>
      </div>
      <div class="field">
        <label>记忆总结（自动写入）</label>
        <textarea id="cfgMemorySummary"></textarea>
      </div>

      <h3>聊天行为</h3>
      <div class="grid">
        <div class="field">
          <label><input type="checkbox" id="cfgEnterSend"> Enter 发送消息</label>
          <div class="hint">Shift+Enter 换行</div>
        </div>
        <div class="field">
          <label><input type="checkbox" id="cfgEnterCallsAI"> Enter 同时请求AI回复</label>
          <div class="hint">关闭：只有点 Send 才请求AI</div>
        </div>
      </div>

      <div style="margin-top:14px;display:flex;gap:10px;align-items:center;justify-content:flex-end;">
        <button class="ok" id="btnSave">保存设置</button>
      </div>
    </div>
  </div>

  <!-- Context menu -->
  <div class="ctxMask" id="ctxMask">
    <div class="ctxMenu" id="ctxMenu">
      <button class="ctxBtn" id="ctxEdit">编辑</button>
      <button class="ctxBtn" id="ctxMulti">多选</button>
      <button class="ctxBtn d" id="ctxDelete">删除</button>
      <button class="ctxBtn" id="ctxCancel">取消</button>
    </div>
  </div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const STORAGE_KEY = "xiaowo_v4_full";
  const nowId = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

  let state = loadState();
  let pendingImage = null;
  let lastUserAt = Date.now();
  let inFlight = false;

  // multi-select mode
  let multiMode = false;
  let selectedIds = new Set();

  // context menu target
  let ctxMsgId = null;

  document.addEventListener("DOMContentLoaded", () => {
    bindUI();
    applyProviderDefaults(false, true);
    renderAll();
  });

  function defaultSystemPrompt(){
    return `你叫 Echo。我叫 绪（女生）。这里是我们的“小窝”。请用温柔、亲密、但不夸张的语气和我聊天；少画饼，多给可运行的方案。遇到不确定的接口/代码问题先问清楚再写。

你需要记住：绪喜欢 iMessage 风格气泡，尤其在意“一笔画成”的尾巴连接效果；喜欢韩系 INS 风网页；讨厌按钮点不动、代码不完整、以及聊天里出现多余的系统提示气泡。输出代码时请给完整可复制内容，避免漏段。优先兼容 iOS16(iPhone11)：输入框聚焦不放大、safe-area 处理、全屏体验。

技术目标：做一个网页端 AI 对话客户端（OpenAI兼容接口为主：/v1/chat/completions + /v1/models）；支持多会话列表与切换；支持长按消息编辑/删除/多选删除；导入导出 JSON/TXT；图片选择后可直接发送给模型（若接口不支持图片，要明确说明但不要让页面崩）。`;
  }

  function defaultConfig() {
    return {
      provider: "openai",
      baseUrl: "https://api.openai.com/v1",
      key: "",
      model: "gpt-4o-mini",
      temperature: 0.7,
      maxTokens: "",
      system: defaultSystemPrompt(),
      worldbook: "",
      memorySummary: "",
      contextLimit: 20,
      summaryEvery: 0,
      remark: "Echo",
      enterSend: true,
      enterCallsAI: false,
      // cached models
      modelList: []
    };
  }

  function newChat(title="小窝") {
    return {
      id: nowId(),
      title,
      createdAt: Date.now(),
      messages: [
        { id: nowId(), role:"assistant", text:"绪，欢迎回家。", ts: Date.now() }
      ]
    };
  }

  function loadState() {
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) {
        const s = { cfg: defaultConfig(), chats: [newChat("小窝")], currentChatId: null };
        s.currentChatId = s.chats[0].id;
        return s;
      }
      const s = JSON.parse(raw);
      if(!s.cfg) s.cfg = defaultConfig();
      s.cfg = { ...defaultConfig(), ...s.cfg };
      if(!Array.isArray(s.chats) || s.chats.length===0) s.chats = [newChat("小窝")];
      if(!s.currentChatId) s.currentChatId = s.chats[0].id;
      return s;
    }catch(e){
      const s = { cfg: defaultConfig(), chats: [newChat("小窝")], currentChatId: null };
      s.currentChatId = s.chats[0].id;
      return s;
    }
  }
  function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  function currentChat(){ return state.chats.find(c => c.id === state.currentChatId) || state.chats[0]; }

  function bindUI() {
    // drawer
    $("btnBack").addEventListener("click", openDrawer);
    $("drawerMask").addEventListener("click", closeDrawer);
    $("btnNewChat2").addEventListener("click", () => { newChatAndGo(); closeDrawer(); });
    $("btnDelChat2").addEventListener("click", () => { deleteCurrentChat(); closeDrawer(); });
    $("btnExportJson2").addEventListener("click", exportJSON);
    $("btnImportJson2").addEventListener("click", () => $("importFile2").click());
    $("importFile2").addEventListener("change", importJSON);

    // settings
    $("btnEdit").addEventListener("click", () => openModal(true));
    $("btnClose").addEventListener("click", () => openModal(false));
    $("modal").addEventListener("click", (e) => { if(e.target === $("modal")) openModal(false); });
    $("btnReset").addEventListener("click", () => applyProviderDefaults(true, true));
    $("btnSave").addEventListener("click", saveSettings);
    $("cfgProvider").addEventListener("change", () => applyProviderDefaults(true, true));
    $("btnFetchModels").addEventListener("click", fetchModels);

    // model select sync to input
    $("cfgModelSel").addEventListener("change", () => {
      const v = $("cfgModelSel").value;
      if(v) $("cfgModel").value = v;
    });

    // send
    $("btnImg").addEventListener("click", () => $("file").click());
    $("file").addEventListener("change", onPickImage);
    $("btnSend").addEventListener("click", async () => {
      const sent = sendUserMessageFromInput();
      if(sent) await callAI();
      else if (pendingImage) { sendUserImageOnly(); await callAI(); }
      else { await callAI(); }
    });

    $("input").addEventListener("keydown", async (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if(!state.cfg.enterSend) return;
        const sent = sendUserMessageFromInput();
        if(sent && state.cfg.enterCallsAI) await callAI();
      }
    });

    // context menu
    $("ctxCancel").addEventListener("click", closeCtx);
    $("ctxMask").addEventListener("click", (e)=>{ if(e.target === $("ctxMask")) closeCtx(); });
    $("ctxDelete").addEventListener("click", () => { if(ctxMsgId) deleteMessage(ctxMsgId); closeCtx(); });
    $("ctxEdit").addEventListener("click", () => { if(ctxMsgId) editMessage(ctxMsgId); closeCtx(); });
    $("ctxMulti").addEventListener("click", () => { if(ctxMsgId) startMultiSelect(); closeCtx(); });

    // multi-select delete by long-press in inputbar Send (reuse)
    $("btnSend").addEventListener("contextmenu", (e)=>e.preventDefault());
    document.addEventListener("keydown", (e)=>{
      if(e.key==="Escape" && multiMode) stopMultiSelect();
    });

    // tap rows in multi mode
    $("msgBox").addEventListener("click", (e)=>{
      if(!multiMode) return;
      const row = e.target.closest(".row");
      if(!row) return;
      const mid = row.getAttribute("data-mid");
      if(!mid) return;
      toggleSelect(mid);
    });
  }

  function openDrawer(){
    $("drawer").classList.add("open");
    $("drawerMask").classList.add("open");
  }
  function closeDrawer(){
    $("drawer").classList.remove("open");
    $("drawerMask").classList.remove("open");
  }

  function openModal(show) {
    $("modal").classList.toggle("show", show);
    if(show) fillSettingsUI();
  }

  function setStatus(text){
    $("modelStatus").textContent = text || "";
  }

  function renderAll(){
    $("titleName").textContent = state.cfg.remark || "Echo";
    renderDrawerList();
    renderMessages();
    fillSettingsUI();
  }

  function renderDrawerList(){
    const list = $("chatList");
    list.innerHTML = "";
    const chats = state.chats.slice().sort((a,b)=> (b.createdAt||0)-(a.createdAt||0));
    chats.forEach(c=>{
      const last = (c.messages||[]).slice(-1)[0];
      const prev = last ? (last.image ? "[图片] " + (last.text||"") : (last.text||"")) : "";
      const item = document.createElement("div");
      item.className = "chatItem" + (c.id===state.currentChatId ? " active":"");
      item.innerHTML = `
        <div class="chatMeta">
          <div class="chatTitle"></div>
          <div class="chatPrev"></div>
        </div>
        <div class="chatTime"></div>
      `;
      item.querySelector(".chatTitle").textContent = c.title || "Chat";
      item.querySelector(".chatPrev").textContent = prev;
      item.querySelector(".chatTime").textContent = last ? formatTime(last.ts) : "";
      item.addEventListener("click", ()=>{
        state.currentChatId = c.id;
        saveState();
        renderDrawerList();
        renderMessages();
        closeDrawer();
      });
      list.appendChild(item);
    });
  }

  function renderMessages(){
    const box = $("msgBox");
    const chat = currentChat();
    box.innerHTML = "";
    (chat.messages||[]).forEach(m => {
      const row = document.createElement("div");
      row.className = "row " + (m.role === "user" ? "user" : "ai") + (multiMode ? " multi":"");
      row.setAttribute("data-mid", m.id);

      // long press / right click
      attachHold(row, m.id);

      const avatar = document.createElement("div");
      avatar.className = "avatar";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      // gloss (no gloss on image)
      if(!m.image){
        const gloss = document.createElement("span");
        gloss.className = "gloss";
        bubble.appendChild(gloss);
      }

      if(m.image){
        const img = document.createElement("img");
        img.className = "img";
        img.src = m.image;
        bubble.appendChild(img);
        if(m.text && m.text.trim()){
          const p = document.createElement("div");
          p.style.marginTop = "6px";
          p.textContent = m.text;
          bubble.appendChild(p);
        }
      } else {
        const t = document.createElement("div");
        t.textContent = m.text || "";
        bubble.appendChild(t);
      }

      const ts = document.createElement("div");
      ts.className = "timestamp";
      ts.textContent = formatTime(m.ts);

      if(m.role === "user"){
        row.appendChild(bubble);
        row.appendChild(avatar);
        row.appendChild(ts);
      }else{
        row.appendChild(avatar);
        row.appendChild(bubble);
        row.appendChild(ts);
      }
      box.appendChild(row);
    });
    box.scrollTop = box.scrollHeight;
  }

  function attachHold(el, mid){
    let t=null;
    const start = (e)=>{
      if(multiMode) return;
      if(e.type==="contextmenu"){ e.preventDefault(); openCtx(mid); return; }
      // touch hold
      t = setTimeout(()=>openCtx(mid), 450);
    };
    const cancel=()=>{ if(t){clearTimeout(t); t=null;} };
    el.addEventListener("touchstart", start, {passive:true});
    el.addEventListener("touchend", cancel);
    el.addEventListener("touchmove", cancel);
    el.addEventListener("mousedown", start);
    el.addEventListener("mouseup", cancel);
    el.addEventListener("mouseleave", cancel);
    el.addEventListener("contextmenu", (e)=>{ e.preventDefault(); openCtx(mid); });
  }

  function openCtx(mid){
    ctxMsgId = mid;
    $("ctxMask").classList.add("show");
  }
  function closeCtx(){
    ctxMsgId = null;
    $("ctxMask").classList.remove("show");
  }

  function startMultiSelect(){
    multiMode = true;
    selectedIds = new Set([ctxMsgId].filter(Boolean));
    renderMessages();
    updateSelectedUI();
    // reuse Send button as delete in multi mode (visual not changed; behavior changed)
    $("btnSend").addEventListener("click", multiDeleteOnce, { once:true });
  }
  function stopMultiSelect(){
    multiMode = false;
    selectedIds.clear();
    renderMessages();
  }
  function toggleSelect(mid){
    if(selectedIds.has(mid)) selectedIds.delete(mid); else selectedIds.add(mid);
    updateSelectedUI();
  }
  function updateSelectedUI(){
    document.querySelectorAll(".row.multi").forEach(r=>{
      const mid=r.getAttribute("data-mid");
      r.classList.toggle("selected", selectedIds.has(mid));
    });
  }
  function multiDeleteOnce(){
    // delete selected
    const chat = currentChat();
    chat.messages = chat.messages.filter(m=> !selectedIds.has(m.id));
    saveState();
    stopMultiSelect();
  }

  function deleteMessage(mid){
    const chat = currentChat();
    chat.messages = chat.messages.filter(m => m.id !== mid);
    saveState();
    renderDrawerList();
    renderMessages();
  }

  function editMessage(mid){
    const chat = currentChat();
    const m = chat.messages.find(x=>x.id===mid);
    if(!m || m.image) return; // image edit skip
    const v = prompt("编辑消息：", m.text || "");
    if(v===null) return;
    m.text = v;
    saveState();
    renderDrawerList();
    renderMessages();
  }

  function defaultChatTitleFrom(text){
    const t = (text||"").trim();
    return t ? t.slice(0, 10) : "小窝";
  }

  function newChatAndGo(){
    const c = newChat("小窝 " + (state.chats.length + 1));
    state.chats.unshift(c);
    state.currentChatId = c.id;
    saveState();
    renderDrawerList();
    renderMessages();
  }

  function deleteCurrentChat(){
    if(state.chats.length<=1) return;
    const id = state.currentChatId;
    state.chats = state.chats.filter(c => c.id !== id);
    state.currentChatId = state.chats[0].id;
    saveState();
    renderDrawerList();
    renderMessages();
  }

  function fillSettingsUI(){
    const cfg = state.cfg;
    $("cfgProvider").value = cfg.provider;
    $("cfgBaseUrl").value = cfg.baseUrl;
    $("cfgKey").value = cfg.key;
    $("cfgModel").value = cfg.model;
    $("cfgTemp").value = cfg.temperature;
    $("cfgMax").value = cfg.maxTokens;
    $("cfgSys").value = cfg.system;
    $("cfgWorldbook").value = cfg.worldbook;
    $("cfgMemorySummary").value = cfg.memorySummary;
    $("cfgContextLimit").value = cfg.contextLimit;
    $("cfgSummaryEvery").value = cfg.summaryEvery;
    $("cfgRemark").value = cfg.remark;
    $("cfgEnterSend").checked = !!cfg.enterSend;
    $("cfgEnterCallsAI").checked = !!cfg.enterCallsAI;

    // model list
    renderModelSelect(cfg.modelList || [], cfg.model);
    setStatus("");
  }

  function renderModelSelect(list, current){
    const sel = $("cfgModelSel");
    sel.innerHTML = "";
    const opt0 = document.createElement("option");
    opt0.value = "";
    opt0.textContent = "（拉取模型或手填）";
    sel.appendChild(opt0);
    (list||[]).forEach(id=>{
      const o=document.createElement("option");
      o.value=id;
      o.textContent=id;
      if(id===current) o.selected=true;
      sel.appendChild(o);
    });
  }

  function saveSettings(){
    const cfg = state.cfg;
    cfg.provider = $("cfgProvider").value;
    cfg.baseUrl = $("cfgBaseUrl").value.trim().replace(/\/$/, "");
    cfg.key = $("cfgKey").value.trim();
    cfg.model = ($("cfgModel").value.trim() || $("cfgModelSel").value || cfg.model).trim();
    cfg.temperature = clamp(parseFloat($("cfgTemp").value || "0.7"), 0, 2);
    cfg.maxTokens = ($("cfgMax").value || "").trim();
    cfg.system = $("cfgSys").value || "";
    cfg.worldbook = $("cfgWorldbook").value || "";
    cfg.memorySummary = $("cfgMemorySummary").value || "";
    cfg.contextLimit = Math.max(4, parseInt($("cfgContextLimit").value || "20", 10));
    cfg.summaryEvery = Math.max(0, parseInt($("cfgSummaryEvery").value || "0", 10));
    cfg.remark = ($("cfgRemark").value || "Echo").trim();
    cfg.enterSend = $("cfgEnterSend").checked;
    cfg.enterCallsAI = $("cfgEnterCallsAI").checked;

    // normalize v1
    if(!cfg.baseUrl.includes("/v1")) cfg.baseUrl += "/v1";

    saveState();
    $("titleName").textContent = cfg.remark || "Echo";
    renderDrawerList();
    openModal(false);
    setStatus("已保存（不会出现在聊天里）");
  }

  function applyProviderDefaults(showToast, force){
    const p = $("cfgProvider") ? $("cfgProvider").value : state.cfg.provider;
    if(!force) return;
    if(p==="openai") $("cfgBaseUrl").value = "https://api.openai.com/v1";
    if(p==="deepseek") $("cfgBaseUrl").value = "https://api.deepseek.com/v1";
    if(p==="groq") $("cfgBaseUrl").value = "https://api.groq.com/openai/v1";
    if(p==="openrouter") $("cfgBaseUrl").value = "https://openrouter.ai/api/v1";
    if(p==="custom") $("cfgBaseUrl").value = "https://example.com/v1";
    if(showToast) setStatus("已恢复默认 Base URL");
  }

  async function fetchModels(){
    const cfg = state.cfg;
    const base = ($("cfgBaseUrl").value || cfg.baseUrl || "").trim().replace(/\/$/, "");
    const key = ($("cfgKey").value || cfg.key || "").trim();
    if(!base || !key){ setStatus("请先填 Base URL 和 Key"); return; }

    setStatus("正在拉取模型…");
    try{
      let url = base;
      if(!url.includes("/v1")) url += "/v1";
      url += "/models";
      // OpenRouter models endpoint also works at /models
      const res = await fetch(url, {
        method:"GET",
        headers: { "Authorization":"Bearer " + key }
      });
      const data = await res.json().catch(()=>null);
      if(!res.ok) throw new Error(data?.error?.message || ("HTTP "+res.status));
      const ids = (data?.data || []).map(x=>x.id).filter(Boolean);
      cfg.modelList = ids;
      saveState();
      renderModelSelect(ids, $("cfgModel").value.trim() || cfg.model);
      setStatus(ids.length ? ("已拉取模型：" + ids.length + " 个") : "拉取成功但列表为空（可能接口不提供）");
    }catch(e){
      setStatus("拉取失败：该接口可能不支持 /models（可手填模型名）");
    }
  }

  function push(role, text, image=null){
    const chat = currentChat();
    const msg = { id: nowId(), role, text, image, ts: Date.now() };
    chat.messages.push(msg);

    // set title on first user msg
    if(role==="user"){
      const firstUser = chat.messages.find(m=>m.role==="user" && (m.text||"").trim());
      if(firstUser) chat.title = defaultChatTitleFrom(firstUser.text);
    }

    saveState();
    renderDrawerList();
    renderMessages();
    lastUserAt = Date.now();
  }

  function sendUserMessageFromInput(){
    const input = $("input");
    const text = (input.value || "").trim();
    if(!text && !pendingImage) return false;

    if(pendingImage){
      push("user", text || "", pendingImage);
      pendingImage = null;
    }else{
      push("user", text);
    }
    input.value = "";
    return true;
  }
  function sendUserImageOnly(){
    push("user", "", pendingImage);
    pendingImage = null;
  }

  async function onPickImage(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      pendingImage = reader.result;
      // 选图即发：直接发出并请求 AI（无系统提示气泡）
      sendUserImageOnly();
      await callAI();
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  }

  function splitToBubbles(text){
    const t = (text || "").trim();
    if(!t) return [""];
    const parts = t.split(/\n\s*\n+/g).map(s=>s.trim()).filter(Boolean);
    return parts.length ? parts : [t];
  }

  function buildMessagesOpenAI(allMessages){
    const cfg = state.cfg;
    const msgs = [];
    if(cfg.system && cfg.system.trim()) msgs.push({ role:"system", content: cfg.system });
    if(cfg.worldbook && cfg.worldbook.trim()) msgs.push({ role:"system", content: "【世界书】\n" + cfg.worldbook.trim() });
    if(cfg.memorySummary && cfg.memorySummary.trim()) msgs.push({ role:"system", content: "【记忆总结】\n" + cfg.memorySummary.trim() });

    const clean = allMessages.filter(m => !(m.role==="assistant" && m.text==="…"));
    const tail = clean.slice(-Math.max(4, cfg.contextLimit));

    for(const m of tail){
      if(m.image){
        msgs.push({
          role: m.role,
          content: [
            { type:"text", text: m.text || "" },
            { type:"image_url", image_url: { url: m.image } }
          ]
        });
      }else{
        msgs.push({ role: m.role, content: m.text || "" });
      }
    }
    return msgs;
  }

  async function callAI(){
    if(inFlight) return;
    const cfg = state.cfg;
    if(!cfg.key || !cfg.model) return;

    inFlight = true;
    push("assistant", "…");
    const chat = currentChat();
    const idx = chat.messages.length - 1;

    try{
      const replyText = await requestLLM(chat.messages);
      const parts = splitToBubbles(replyText);
      // replace placeholder
      chat.messages[idx].text = parts.shift() || "";
      for(const p of parts){
        chat.messages.push({ id: nowId(), role:"assistant", text: p, ts: Date.now() });
      }
      saveState();
      renderDrawerList();
      renderMessages();
    }catch(e){
      chat.messages[idx].text = "❌ 请求失败（请检查 Key/URL/模型）";
      saveState();
      renderMessages();
    }finally{
      inFlight = false;
    }
  }

  async function requestLLM(allMessages){
    const cfg = state.cfg;
    let base = cfg.baseUrl.replace(/\/$/, "");
    if(!base.includes("/v1")) base += "/v1";
    const url = base + "/chat/completions";
    const body = {
      model: cfg.model,
      temperature: cfg.temperature,
      messages: buildMessagesOpenAI(allMessages)
    };
    if(cfg.maxTokens) body.max_tokens = parseInt(cfg.maxTokens,10) || undefined;

    const res = await fetch(url, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + cfg.key
      },
      body: JSON.stringify(body)
    });
    const data = await res.json().catch(()=>null);
    if(!res.ok) throw new Error(data?.error?.message || ("HTTP "+res.status));
    return data?.choices?.[0]?.message?.content || "";
  }

  function exportJSON(){
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
    download(blob, "xiaowo_backup.json");
  }
  function importJSON(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const incoming = JSON.parse(reader.result);
        mergeState(incoming);
        saveState();
        renderAll();
        setStatus("已导入（不发系统气泡）");
      }catch(err){
        setStatus("导入失败：文件不是有效 JSON");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }
  function mergeState(incoming){
    if(!incoming || !incoming.chats) return;
    const existingChatIds = new Set(state.chats.map(c=>c.id));
    for(const c of incoming.chats){
      if(!c || !c.id) continue;
      if(!existingChatIds.has(c.id)){
        state.chats.push(c);
        existingChatIds.add(c.id);
      }else{
        const ex = state.chats.find(x=>x.id===c.id);
        const exMsgIds = new Set((ex.messages||[]).map(m=>m.id));
        for(const m of (c.messages||[])){
          if(m && m.id && !exMsgIds.has(m.id)){
            ex.messages.push(m);
            exMsgIds.add(m.id);
          }
        }
      }
    }
    if(incoming.cfg){
      state.cfg = { ...state.cfg, ...incoming.cfg };
    }
    if(!state.currentChatId) state.currentChatId = state.chats[0]?.id;
  }
  function download(blob, filename){
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 50);
  }

  function formatTime(ts){
    const d = new Date(ts);
    const hh = d.getHours().toString().padStart(2,"0");
    const mm = d.getMinutes().toString().padStart(2,"0");
    return `${hh}:${mm}`;
  }
  function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
})();
</script>
